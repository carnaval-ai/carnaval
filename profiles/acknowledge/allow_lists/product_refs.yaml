# Patterns de references produit a NE PAS masquer.
# (Informatif pour la documentation. La preservation se fait via le score
# threshold et le dedup, pas via une liste explicite : si le mot ressemble
# a une reference produit, aucun recognizer ne le matche.)

product_ref_patterns:
  - "[A-Z]{2,4}-[A-Z0-9]{2,8}-\\d{2,4}"   # ex: KHZ-DA-032
  - "[A-Z]{3}[A-Z0-9]{3,8}"                # ex: RKMCK3
  - "\\d{4}\\s\\d{2}\\s\\d{2}"             # ex: 7828 00 10
