# Lexique metier universel : libelles a ne jamais masquer.
#
# But : un accuse de reception / une commande contient des libelles
# structurants (objet, destinataire, quantite, prix, remise, montant,
# port...). Ce ne sont jamais des donnees personnelles ; les masquer
# nuirait a la lecture du document par un service d'extraction. Ce
# lexique les protege.
#
# Portee : ce fichier est dans la couche `config/` (couche de base) -> il
# s'applique a TOUS les profils et a tous les documents.
#
# Forme : des mots litteraux, un bloc par langue. L'appariement est
# insensible a la casse et aux accents ; un mot est borne par des limites
# de mot (sauf en ecriture chinoise). Pas de regex ici - voir les autres
# fichiers `allow_lists/` (*_patterns) pour les motifs.
#
# Trame : releve sur des AR fournisseurs reels (FR) + check-list des
# business terms de la norme EN 16931 (facturation electronique).
